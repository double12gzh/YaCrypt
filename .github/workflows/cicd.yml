name: Rust CI and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]  # 推送 v 开头的标签时触发发布
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 代码检查和测试
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  # 跨平台构建
  build:
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            asset_name: yacrypt-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-aarch64
            asset_name: yacrypt-macos-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
            asset_name: yacrypt-macos-x86_64.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        run: |
          strip target/${{ matrix.target }}/release/yacrypt || true

      - name: Create archive
        shell: bash
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          if [ -f ./yacrypt ]; then
            tar czf ../../../dist/${{ matrix.asset_name }} yacrypt
          else
            echo "Built binary not found at target/${{ matrix.target }}/release/yacrypt"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 5

  # 发布到 crates.io
  publish-crate:
    needs: [check, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check if version already exists
        id: check_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | cut -d'"' -f2)
          CRATE_NAME=$(grep '^name =' Cargo.toml | cut -d'"' -f2)
          if curl -sf "https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}" | grep -q '"version"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} already exists on crates.io, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} not found on crates.io, will publish"
          fi

      - name: Publish to crates.io
        if: steps.check_version.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish

  # 创建 GitHub Release
  create-release:
    needs: [check, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # 用于签名

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: find artifacts -type f

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -name "*.tar.gz" -o -name "*.zip" | while read f; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Install git-cliff
        run: |
          VERSION=2.11.0
          DOWNLOAD_URL="https://github.com/orhun/git-cliff/releases/download/v${VERSION}/git-cliff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -L "$DOWNLOAD_URL" -o git-cliff.tar.gz || { echo "Failed to download git-cliff"; exit 1; }
          tar -xzf git-cliff.tar.gz || { echo "Failed to extract git-cliff"; exit 1; }
          if [ ! -f "git-cliff-${VERSION}/git-cliff" ]; then
            echo "git-cliff binary not found after extraction"
            exit 1
          fi
          sudo mv git-cliff-${VERSION}/git-cliff /usr/local/bin/ || { echo "Failed to install git-cliff"; exit 1; }
          rm -rf git-cliff.tar.gz git-cliff-${VERSION}
          git-cliff --version || { echo "git-cliff installation verification failed"; exit 1; }

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git-cliff --config cliff.toml --latest --strip header)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sigstore CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install sigstore

      - name: Sign binaries with Sigstore
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) | while read f; do
            echo "Signing $f"
            sigstore sign "$f" --bundle "$f.sigstore" || echo "Failed to sign $f, continuing..."
          done

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
