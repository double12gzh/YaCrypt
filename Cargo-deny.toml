[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore-fixes = [
    { id = "RUSTSEC-2020-0001", reason = "Local usage, no network involved" }
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
]
deny = ["GPL-3.0"]
copyleft = "deny"

[bans]
multiple-versions = "allow"
highlight = [
    "regex",
    "serde",
    "tokio",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"